<body>

                            <label class="checkbox-item">

                            </label>
                            <label class="checkbox-item">

                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="tech" value="cv">

                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="tech" value="nlp">
                                <span class="checkbox-label">自然语言处理</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="tech" value="web">
                                <span class="checkbox-label">Web开发</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="tech" value="database">

                            </label>

                    </div>
                    
                    <div class="form-group">
                        <label for="userSkills">你目前已掌握的技能</label>

                    </div>

        // 学习资源数据

            },
            web: {
                name: 'Web开发',
                modules: [
                    {

                        goal: '学会网页结构和样式设计',
                        resources: [
                            {
                                title: 'MDN Web教程',
                                type: '文档',
                                platform: 'MDN',
                                url: 'https://developer.mozilla.org/zh-CN/docs/Learn',

                            }

                ]
            },
            database: {

                modules: [

                        goal: '学会使用MySQL/MongoDB',
                        resources: [
                            {
                                title: 'MySQL教程',
                                type: '文档',
                                platform: '菜鸟教程',
                                url: 'https://www.runoob.com/mysql/mysql-tutorial.html',
                                reason: 'MySQL入门教程',
                                difficulty: 'medium',
                                duration: '6小时'
                            }
                        ]
                    }
                ]
            },
            api: {
                name: 'API开发',
                modules: [
                    {
                        name: 'HTTP与API基础',
                        goal: '理解HTTP协议，学会使用requests库调用API',
                        resources: [
                            {
                                title: 'HTTP协议详解',
                                type: '文档',
                                platform: 'MDN',
                                url: 'https://developer.mozilla.org/zh-CN/docs/Web/HTTP',
                                reason: 'MDN权威文档，全面介绍HTTP协议',
                                difficulty: 'medium',
                                duration: '3小时'
                            }
                        ]
                    }
                ]
            },
            deployment: {
                name: '项目部署',
                modules: [
                    {
                        name: '项目部署入门',
                        goal: '将项目部署到云服务器，实现公网访问',
                        resources: [
                            {
                                title: 'Streamlit Cloud部署',
                                type: '文档',
                                platform: 'Streamlit',
                                url: 'https://docs.streamlit.io/streamlit-community-cloud/get-started',
                                reason: '免费部署方案，适合学生项目',
                                difficulty: 'easy',
                                duration: '2小时'
                            }
                        ]
                    }
                ]
            }
        };
        
        // 技术依赖关系
        const TECH_DEPENDENCIES = {
            llm: ['python', 'api'],
            rag: ['python', 'llm', 'database'],
            agent: ['python', 'llm', 'api'],
            cv: ['python'],
            nlp: ['python'],
            web: [],
            database: [],
            python: []
        };
        
        // 存储管理
        function clearAllStorage() {
            try {
                localStorage.clear();
                sessionStorage.clear();
                // 清除cookies
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i];
                    const eqPos = cookie.indexOf('=');
                    const name = eqPos > -1 ? cookie.substr(0, eqPos) : cookie;
                    document.cookie = name + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
                }
                return true;
            } catch (e) {
                return false;
            }
        }
        
        function getStorageStatus() {
            return {
                localStorageLength: localStorage.length,
                sessionStorageLength: sessionStorage.length,
                cookiesLength: document.cookie.split(';').length
            };
        }
        
        // 学习路径生成
        function createLearningPath(projectInfo) {
            const { name, description, techFields, skills, timeline } = projectInfo;
            
            // 收集所有需要的技术领域（包括依赖）
            const allTechFields = new Set(techFields);
            techFields.forEach(field => {
                const deps = TECH_DEPENDENCIES[field] || [];
                deps.forEach(dep => allTechFields.add(dep));
            });
            
            // 排序技术领域
            const orderedFields = [];
            const added = new Set();
            
            function addField(field) {
                if (added.has(field)) return;
                const deps = TECH_DEPENDENCIES[field] || [];
                deps.forEach(dep => addField(dep));
                if (!added.has(field)) {
                    orderedFields.push(field);
                    added.add(field);
                }
            }
            
            techFields.forEach(field => addField(field));
            
            // 添加部署阶段
            if (!orderedFields.includes('deployment')) {
                orderedFields.push('deployment');
            }
            
            // 创建学习阶段
            const stages = [];
            const weeksPerStage = Math.max(1, Math.floor(timeline / 4));
            const totalWeeks = parseInt(timeline);
            
            let currentStageModules = [];
            let currentStageHours = 0;
            const maxHoursPerStage = totalWeeks <= 4 ? 25 : totalWeeks <= 6 ? 30 : 35;
            
            orderedFields.forEach(field => {
                const fieldData = LEARNING_RESOURCES[field];
                if (!fieldData) return;
                
                fieldData.modules.forEach(module => {
                    const moduleHours = module.resources.reduce((sum, r) => {
                        const match = r.duration.match(/(\d+)/);
                        return sum + (match ? parseInt(match[1]) : 2);
                    }, 0);
                    
                    if (currentStageHours + moduleHours > maxHoursPerStage && currentStageModules.length > 0) {
                        stages.push({
                            stage: stages.length + 1,
                            stageName: `第${stages.length + 1}阶段`,
                            week: `第${stages.length * weeksPerStage + 1}-${Math.min((stages.length + 1) * weeksPerStage, totalWeeks)}周`,
                            duration: `约${currentStageHours}小时`,
                            stageGoal: `掌握${currentStageModules.map(m => m.name).join('、')}相关知识`,
                            modules: currentStageModules
                        });
                        currentStageModules = [];
                        currentStageHours = 0;
                    }
                    
                    currentStageModules.push(module);
                    currentStageHours += moduleHours;
                });
            });
            
            if (currentStageModules.length > 0) {
                stages.push({
                    stage: stages.length + 1,
                    stageName: `第${stages.length + 1}阶段`,
                    week: `第${stages.length * weeksPerStage + 1}-${totalWeeks}周`,
                    duration: `约${currentStageHours}小时`,
                    stageGoal: `掌握${currentStageModules.map(m => m.name).join('、')}相关知识`,
                    modules: currentStageModules
                });
            }
            
            return {
                id: 'path_' + Date.now(),
                name: name,
                description: description,
                techFields: techFields,
                requirements: Array.from(allTechFields).map(f => LEARNING_RESOURCES[f]?.name || f),
                currentSkills: skills,
                timeline: totalWeeks,
                stages: stages
            };
        }
        
        // 应用状态
        let currentPath = null;
        
        // AI API 配置
        const API_CONFIG = {
            key: 'sk-c189246f01324661a524a7b0c9fb9918',
            baseUrl: 'https://api.deepseek.com',

        // 初始化
        function initApp() {
            // 清除所有存储
            const cleared = clearAllStorage();
            
            // 显示调试信息
            updateDebugInfo();
            
            // 设置事件监听器
            setupEventListeners();
        }
        
        function updateDebugInfo() {
            const debugInfo = document.getElementById('debugInfo');
            const status = getStorageStatus();
            
            let info = '=== 系统状态 ===\n';
            info += '页面加载时间: ' + new Date().toLocaleString() + '\n';
            info += 'URL: ' + window.location.href + '\n';
            info += 'localStorage 项目数: ' + status.localStorageLength + '\n';
            info += 'sessionStorage 项目数: ' + status.sessionStorageLength + '\n';
            info += 'Cookies 数量: ' + status.cookiesLength + '\n';
            
            debugInfo.textContent = info;
        }
        
        function setupEventListeners() {
            // 表单提交
            const form = document.getElementById('project-form');
            form.addEventListener('submit', handleFormSubmit);
            
            // 返回按钮
            const backBtn = document.getElementById('backBtn');
            backBtn.addEventListener('click', goBack);
            
            // AI优化按钮
            const optimizeDescBtn = document.getElementById('optimizeDescBtn');
            optimizeDescBtn.addEventListener('click', optimizeProjectDescription);
            
            // 应用优化描述按钮
            const applyOptimizedBtn = document.getElementById('applyOptimizedBtn');
            applyOptimizedBtn.addEventListener('click', applyOptimizedDescription);
        }
        
        // AI优化项目描述
        async function optimizeProjectDescription() {
            const projectName = document.getElementById('projName').value.trim();
            const projectDesc = document.getElementById('projDesc').value.trim();
            
            if (!projectName || !projectDesc) {
                alert('请先填写项目名称和描述');
                return;
            }
            
            // 显示加载状态
            const optimizeBtn = document.getElementById('optimizeDescBtn');
            const originalText = optimizeBtn.textContent;
            optimizeBtn.textContent = '优化中...';
            optimizeBtn.disabled = true;
            
            try {
                const optimizedDesc = await callAIForOptimization(projectName, projectDesc);
                
                // 显示优化结果
                document.getElementById('optimizedDescText').textContent = optimizedDesc;
                document.getElementById('optimizedDesc').style.display = 'block';
            } catch (error) {
                console.error('AI优化失败:', error);
                alert('AI优化失败，请检查API配置或网络连接');
            } finally {
                // 恢复按钮状态
                optimizeBtn.textContent = originalText;
                optimizeBtn.disabled = false;
            }
        }
        
        // 调用AI API进行描述优化
        async function callAIForOptimization(projectName, projectDesc) {
            const systemPrompt = `你是一个专业的项目分析师，擅长将学生项目描述优化为更专业、清晰、具体的技术文档。

优化要求：
1. 保持原有的项目核心功能和目标
2. 提高描述的专业性和技术性
3. 明确项目的技术需求和实现路径
4. 分析项目可能涉及的技术领域，不仅限于用户选择的领域
5. 优化后的描述应该结构清晰，逻辑连贯
6. 输出语言为中文

请直接返回优化后的完整描述，不要有任何引言或解释。`;
            
            const userPrompt = `项目名称：${projectName}

原始描述：${projectDesc}`;
            
            try {
                const response = await fetch(`${API_CONFIG.baseUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_CONFIG.key}`
                    },
                    body: JSON.stringify({
                        model: API_CONFIG.model,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userPrompt }
                        ],
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(`API请求失败: ${response.status} ${response.statusText} - ${JSON.stringify(errorData)}`);
                }
                
                const data = await response.json();
                if (!data.choices || !data.choices[0] || !data.choices[0].message || !data.choices[0].message.content) {
                    throw new Error('API返回格式错误');
                }
                return data.choices[0].message.content.trim();
            } catch (error) {
                console.error('API调用详细错误:', error);
                throw error;
            }
        }
        
        // 应用优化后的描述
        function applyOptimizedDescription() {
            const optimizedDesc = document.getElementById('optimizedDescText').textContent;
            document.getElementById('projDesc').value = optimizedDesc;
            document.getElementById('optimizedDesc').style.display = 'none';
        }
        
        function handleFormSubmit(event) {
            event.preventDefault();
            
            // 获取表单数据
            const form = event.target;
            const name = form.projName.value.trim();
            const description = form.projDesc.value.trim();
            const techFields = Array.from(form.querySelectorAll('input[name="tech"]:checked'))
                .map(cb => cb.value);
            const skills = form.userSkills.value.trim();
            const timeline = form.timeFrame.value;
            
            // 验证
            if (techFields.length === 0) {
                alert('请至少选择一个技术领域');
                return;
            }
            
            // 创建项目信息对象
            const projectInfo = {
                name: name,
                description: description,
                techFields: techFields,
                skills: skills,
                timeline: timeline
            };
            
            // 生成学习路径
            currentPath = createLearningPath(projectInfo);
            
            // 显示学习路径
            showLearningPath(currentPath);
        }
        
        function showLearningPath(path) {
            // 切换显示
            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('path-section').classList.remove('hidden');
            
            // 填充基本信息
            document.getElementById('pathTitle').textContent = path.name;
            document.getElementById('pathDesc').textContent = path.description;
            
            // 填充技能要求
            const skillsHtml = `
                <h4>需要掌握的技能</h4>
                <ul>
                    ${path.requirements.map(req => `<li>${req}</li>`).join('')}
                </ul>
                ${path.currentSkills ? `<p class="current-skills"><strong>已掌握技能：</strong>${path.currentSkills}</p>` : ''}
            `;
            document.getElementById('pathSkills').innerHTML = skillsHtml;
            
            // 渲染时间线
            renderTimeline(path);
            
            // 渲染进度
            renderProgress(path);
        }
        
        function renderTimeline(path) {
            const timeline = document.getElementById('timeline');
            const stages = path.stages;
            
            timeline.innerHTML = stages.map((stage, index) => {
                return `
                    <div class="stage">
                        <div class="stage-header" onclick="toggleStage(${index})"><h3>${stage.stageName}</h3>
                            <div class="stage-info">
                                <span class="stage-week">${stage.week}</span>
                                <span class="stage-duration">预计${stage.duration}</span>
                                <button class="stage-toggle">▼</button>
                            </div>
                        </div>
                        <div class="stage-content">
                            <div class="stage-goal">
                                <strong>阶段目标：</strong>${stage.stageGoal}
                            </div>
                            <div class="module-list">
                                ${stage.modules.map(module => renderModule(module)).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderModule(module) {
            return `
                <div class="module">
                    <h4>${module.name}</h4>
                    <p class="module-goal">${module.goal}</p>
                    <div class="resource-list">
                        ${module.resources.map(resource => renderResource(resource)).join('')}
                    </div>
                </div>
            `;
        }
        
        function renderResource(resource) {
            const difficultyText = {
                'easy': '入门',
                'medium': '进阶',
                'hard': '高级'
            }[resource.difficulty];
            
            const typeIcon = {
                '文档': '📄',
                '视频': '🎬',
                '教程': '📖',
                '项目': '🔧'
            }[resource.type] || '📚';
            
            return `
                <div class="resource">
                    <div class="resource-icon">${typeIcon}</div>
                    <div class="resource-info">
                        <div class="resource-title">
                            <a href="${resource.url}" target="_blank" rel="noopener noreferrer">${resource.title}</a>
                        </div>
                        <div class="resource-meta">
                            <span class="resource-tag">${resource.type}</span>
                            <span class="resource-tag">${resource.platform}</span>
                            <span class="resource-tag">${difficultyText}</span>
                            <span class="resource-tag">${resource.duration}</span>
                        </div>
                        <p class="resource-reason">${resource.reason}</p>
                    </div>
                </div>
            `;
        }
        
        function renderProgress(path) {
            const progressOverview = document.getElementById('progressOverview');
            const totalResources = path.stages.reduce((total, stage) => {
                return total + stage.modules.reduce((count, module) => {
                    return count + module.resources.length;
                }, 0);
            }, 0);
            
            progressOverview.innerHTML = `
                <h4>总体学习进度</h4>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 0%"></div>
                </div>
                <p class="progress-text">已完成 0/${totalResources} 个学习资源 (0%)</p>
            `;
        }
        
        function toggleStage(index) {
            const stage = document.querySelectorAll('.stage-content')[index];
            const toggle = document.querySelectorAll('.stage-toggle')[index];
            
            if (stage.classList.contains('collapsed')) {
                stage.classList.remove('collapsed');
                toggle.classList.remove('collapsed');
            } else {
                stage.classList.add('collapsed');
                toggle.classList.add('collapsed');
            }
        }
        
        function goBack() {
            document.getElementById('path-section').classList.add('hidden');
            document.getElementById('input-section').classList.remove('hidden');
            updateDebugInfo();
        }
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
